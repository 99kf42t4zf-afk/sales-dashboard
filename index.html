  if(p===0) return 'ratio-even';
  const r = (c/p)*100;
  return r >= 100 ? 'ratio-up' : 'ratio-down';
};
const arrowIcon = (c,p) => {
  if(p===0) return '';

};

// ===== Per-store detail sections =====
const allStoresFull = ["寝屋川","茨木","香里園","GIFT","テラス","EaT","ライブラリ"];

allStoresFull.forEach((storeName, si) => {
  const sd = storeData[storeName];
  const sorted = [...sd.items].sort((a,b) => b.cur - a.cur);

  let html = `<div class="store-section">
    <h2>${storeName}店</h2>
    <div class="chart-grid">
      <div class="chart-card">
        <h2>商品別 売上金額比較</h2>
        <div class="desc">上位商品の当期 vs 前期</div>
        <div class="chart-container"><canvas id="chart-detail-${si}" height="160"></canvas></div>
      </div>
      <div class="chart-card">
        <h2>商品別 売上一覧</h2>
        <div class="desc">全商品の詳細数値。金額比率で色分け表示。</div>
        <div style="max-height:400px;overflow-y:auto;">
          <table class="detail">
            <thead><tr>
              <th>商品</th>
              <th>当期売上</th>
              <th>前期売上</th>
              <th>前期比</th>
              <th>当期個数</th>
              <th>前期個数</th>
            </tr></thead><tbody>`;

  sorted.forEach(item => {
    const r = item.prev === 0 ? '---' : ((item.cur/item.prev)*100).toFixed(1) + '%';
    const rc = item.prev === 0 ? 'ratio-even' : (item.cur/item.prev >= 1 ? 'ratio-up' : 'ratio-down');
    html += `<tr>
      <td>${item.name}</td>
      <td>${fmt(item.cur)}円</td>
      <td>${fmt(item.prev)}円</td>
      <td><span class="ratio-badge ${rc}">${r}</span></td>
      <td>${fmt(item.curQty)}</td>
      <td>${fmt(item.prevQty)}</td>
    </tr>`;
  });

  const tr = sd.total;
  const totalR = ((tr.cur/tr.prev)*100).toFixed(1);
  const totalRc = tr.cur/tr.prev >= 1 ? 'ratio-up' : 'ratio-down';
  html += `</tbody><tfoot><tr style="font-weight:bold;background:#f8f9fa;">
    <td>合計</td>
    <td>${fmt(tr.cur)}円</td>
    <td>${fmt(tr.prev)}円</td>
    <td><span class="ratio-badge ${totalRc}">${totalR}%</span></td>
    <td>${fmt(tr.curQty)}</td>
    <td>${fmt(tr.prevQty)}</td>
  </tr></tfoot></table></div></div></div></div>`;

  app.insertAdjacentHTML('beforeend', html);

  // Bar chart per store
  const top = sorted.slice(0, 8);
  new Chart(document.getElementById(`chart-detail-${si}`), {
    type: 'bar',
    data: {
      labels: top.map(i => i.name),
      datasets: [
        { label: '当期', data: top.map(i => i.cur), backgroundColor: colorsCur[si], borderRadius: 4 },
        { label: '前期', data: top.map(i => i.prev), backgroundColor: colorsPrev[si], borderRadius: 4 }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: {
        datalabels: { display: false },
        tooltip: {
          callbacks: { label: ctx => ctx.dataset.label + ': ' + fmt(ctx.raw) + '円' }
        }
      },
      scales: {
        x: { ticks: { callback: v => fmtMan(v) }, grid: { color: '#eee' } }
      }
    }
  });
});
